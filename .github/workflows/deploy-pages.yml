# Build and publish the SPA to GitHub Pages (requires Pages source = GitHub Actions in repo Settings).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Vite only bakes env in at `npm run build`. Must be defined here or the live site shows “no server”.
      - name: Check sheet ingest URL
        env:
          VITE_INGEST_URL: ${{ secrets.VITE_INGEST_URL || vars.VITE_INGEST_URL }}
        run: |
          if [ -n "$VITE_INGEST_URL" ]; then
            echo "VITE_INGEST_URL from GitHub Actions (${#VITE_INGEST_URL} chars)."
            exit 0
          fi
          if [ -f public/fleet-config.json ] && grep -q '/exec' public/fleet-config.json; then
            echo "Using public/fleet-config.json for ingest URL at build time."
            exit 0
          fi
          echo "::error title=Missing ingest URL::Add GitHub Actions secret or variable VITE_INGEST_URL, OR commit public/fleet-config.json (copy from fleet-config.example.json). Then re-run this workflow."
          exit 1

      - name: Install and build
        run: npm ci && npm run build
        env:
          # Repository Pages URL is https://<owner>.github.io/<repo>/ — assets must use this prefix.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Prefer Secret (many teams put the URL there); Variables tab also works. Either must be named VITE_INGEST_URL exactly.
          VITE_INGEST_URL: ${{ secrets.VITE_INGEST_URL || vars.VITE_INGEST_URL }}
          VITE_FLEET_PASSWORD: ${{ secrets.VITE_FLEET_PASSWORD }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
